<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <!-- card background (keeps it readable in GitHub light & dark) -->
  <rect x="0" y="0" width="960" height="620" rx="16" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="959" height="619" rx="16" fill="none" stroke="#e2e8f0"/>

  <!-- title -->
  <text x="480" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">ESP32-CAM — flashing via a spare ESP32 as USB-serial bridge</text>
  <text x="480" y="68" text-anchor="middle" font-size="14" fill="#64748b">Hold the bridge's chip in reset (EN→GND) so its CP2102 talks to the camera. Wire TX→U0T / RX→U0R STRAIGHT.</text>

  <!-- ===== Bridge board ===== -->
  <rect x="70" y="120" width="250" height="380" rx="12" fill="#1e293b"/>
  <rect x="92" y="140" width="206" height="120" rx="8" fill="#334155"/>
  <text x="195" y="195" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">ESP32 DevKit</text>
  <text x="195" y="216" text-anchor="middle" font-size="13" fill="#94a3b8">(the BRIDGE)</text>
  <text x="195" y="236" text-anchor="middle" font-size="12" fill="#94a3b8">USB + CP2102</text>
  <!-- USB stub -->
  <rect x="170" y="500" width="50" height="22" rx="3" fill="#475569"/>
  <text x="195" y="540" text-anchor="middle" font-size="12" fill="#64748b">USB → host (flash)</text>

  <!-- Bridge pins (right edge) -->
  <!-- EN -->
  <circle cx="320" cy="300" r="7" fill="#f59e0b"/>
  <text x="305" y="305" text-anchor="end" font-size="14" font-weight="600" fill="#e2e8f0">EN</text>
  <!-- 5V -->
  <circle cx="320" cy="345" r="7" fill="#ef4444"/>
  <text x="305" y="350" text-anchor="end" font-size="14" font-weight="600" fill="#e2e8f0">5V</text>
  <!-- GND -->
  <circle cx="320" cy="390" r="7" fill="#0f172a" stroke="#94a3b8"/>
  <text x="305" y="395" text-anchor="end" font-size="14" font-weight="600" fill="#e2e8f0">GND</text>
  <!-- TX -->
  <circle cx="320" cy="435" r="7" fill="#22c55e"/>
  <text x="305" y="440" text-anchor="end" font-size="14" font-weight="600" fill="#e2e8f0">TX</text>
  <!-- RX -->
  <circle cx="320" cy="480" r="7" fill="#3b82f6"/>
  <text x="305" y="485" text-anchor="end" font-size="14" font-weight="600" fill="#e2e8f0">RX</text>

  <!-- EN -> GND local jumper on the bridge -->
  <path d="M320 300 C 360 300, 360 390, 320 390" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="6 4"/>
  <text x="372" y="349" font-size="11" fill="#f59e0b">EN→GND</text>

  <!-- ===== Camera board ===== -->
  <rect x="640" y="120" width="250" height="380" rx="12" fill="#0b3b2e"/>
  <rect x="662" y="140" width="206" height="130" rx="8" fill="#11503d"/>
  <circle cx="765" cy="205" r="34" fill="#0a0a0a" stroke="#1f2937" stroke-width="6"/>
  <circle cx="765" cy="205" r="14" fill="#0e7490"/>
  <text x="765" y="290" text-anchor="middle" font-size="15" font-weight="700" fill="#d1fae5">ESP32-CAM</text>
  <text x="765" y="310" text-anchor="middle" font-size="12" fill="#6ee7b7">(the TARGET, has PSRAM)</text>

  <!-- Camera pins (left edge) -->
  <!-- 5V -->
  <circle cx="640" cy="345" r="7" fill="#ef4444"/>
  <text x="655" y="350" font-size="14" font-weight="600" fill="#d1fae5">5V</text>
  <!-- GND -->
  <circle cx="640" cy="390" r="7" fill="#0f172a" stroke="#94a3b8"/>
  <text x="655" y="395" font-size="14" font-weight="600" fill="#d1fae5">GND</text>
  <!-- U0T -->
  <circle cx="640" cy="435" r="7" fill="#22c55e"/>
  <text x="655" y="440" font-size="14" font-weight="600" fill="#d1fae5">U0T</text>
  <!-- U0R -->
  <circle cx="640" cy="480" r="7" fill="#3b82f6"/>
  <text x="655" y="485" font-size="14" font-weight="600" fill="#d1fae5">U0R</text>
  <!-- IO0 -->
  <circle cx="765" cy="465" r="7" fill="#f59e0b"/>
  <text x="765" y="455" text-anchor="middle" font-size="14" font-weight="600" fill="#d1fae5">IO0</text>
  <!-- a GND pad near IO0 -->
  <circle cx="825" cy="465" r="7" fill="#0f172a" stroke="#94a3b8"/>
  <text x="840" y="470" font-size="13" font-weight="600" fill="#d1fae5">GND</text>
  <!-- IO0 -> GND local jumper on the cam -->
  <path d="M765 465 C 795 465, 795 465, 825 465" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="6 4"/>
  <text x="730" y="500" text-anchor="middle" font-size="11" fill="#fbbf24">IO0→GND = flash mode</text>

  <!-- ===== board-to-board wires ===== -->
  <!-- 5V red -->
  <path d="M320 345 C 480 345, 480 345, 640 345" fill="none" stroke="#ef4444" stroke-width="3.5"/>
  <!-- GND black -->
  <path d="M320 390 C 480 390, 480 390, 640 390" fill="none" stroke="#334155" stroke-width="3.5"/>
  <!-- TX -> U0T green -->
  <path d="M320 435 C 480 435, 480 435, 640 435" fill="none" stroke="#22c55e" stroke-width="3.5"/>
  <!-- RX -> U0R blue -->
  <path d="M320 480 C 480 480, 480 480, 640 480" fill="none" stroke="#3b82f6" stroke-width="3.5"/>

  <!-- wire labels -->
  <text x="480" y="338" text-anchor="middle" font-size="12" fill="#b91c1c">5V → 5V</text>
  <text x="480" y="383" text-anchor="middle" font-size="12" fill="#475569">GND → GND</text>
  <text x="480" y="428" text-anchor="middle" font-size="12" fill="#15803d">TX → U0T</text>
  <text x="480" y="473" text-anchor="middle" font-size="12" fill="#1d4ed8">RX → U0R</text>

  <!-- ===== notes ===== -->
  <text x="70" y="585" font-size="12.5" fill="#475569">⚠  Verify 5V→5V and GND→GND first (a swap shorts the board).  •  Common ground is mandatory for serial.</text>
  <text x="70" y="606" font-size="12.5" fill="#475569">Flash with: esptool --before no_reset … --flash_freq 40m.  After flashing, remove IO0→GND and reset to run.  Prefer a strong 5V source for the cam.</text>
</svg>
